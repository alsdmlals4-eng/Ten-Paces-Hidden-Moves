name: Documentation Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    name: documentation-governance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile governance and combat contract tests
        run: |
          python -m py_compile \
            tools/check_project_operating_system.py \
            tools/check_canonical_reference_freshness.py \
            tools/check_skill_package_integrity.py \
            tests/test_project_governance.py \
            tests/check_card_component_contract.py \
            tests/check_combat_board_contract.py \
            tests/check_canonical_combat_docs.py

      - name: Validate project operating system
        run: |
          set -o pipefail
          python tools/check_project_operating_system.py \
            --root . \
            --config .github/documentation-governance.json \
            2>&1 | tee project-operating-system.log

      - name: Validate canonical reference freshness
        run: |
          set -o pipefail
          python tools/check_canonical_reference_freshness.py \
            --root . \
            --config .github/reference-freshness.json \
            2>&1 | tee reference-freshness.log

      - name: Validate project Skill package integrity
        run: |
          set -o pipefail
          python tools/check_skill_package_integrity.py \
            2>&1 | tee skill-package-integrity.log

      - name: Run governance regression tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_project_governance.py' \
            2>&1 | tee governance-regression.log

      - name: Validate card component contract
        run: |
          set -o pipefail
          python tests/check_card_component_contract.py \
            2>&1 | tee card-component-contract.log

      - name: Validate combat contract
        run: |
          set -o pipefail
          python tests/check_combat_board_contract.py \
            2>&1 | tee combat-board-contract.log

      - name: Validate canonical combat impact map
        run: |
          set -o pipefail
          python tests/check_canonical_combat_docs.py \
            2>&1 | tee canonical-combat-docs.log

      - name: Parse PowerShell automations
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-diagnostics
          path: |
            project-operating-system.log
            reference-freshness.log
            skill-package-integrity.log
            governance-regression.log
            card-component-contract.log
            combat-board-contract.log
            canonical-combat-docs.log
          if-no-files-found: warn
          retention-days: 7

      - name: Record verification boundaries
        run: |
          echo "Governance success proves structure, routing, publication-policy shape, canonical references, Skill integrity, regression checks, static card/combat contracts, and automation parsing on this commit."
          echo "It does not prove Godot runtime, PDF rendering, Windows user comprehension, assistive-technology usability, release performance, user visual review, or branch-protection enforcement."
