name: Documentation Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    name: documentation-governance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile governance tools
        run: |
          python -m py_compile \
            tools/check_documentation_governance.py \
            tools/check_canonical_reference_freshness.py \
            tools/check_skill_package_integrity.py

      - name: Validate project operating system
        run: |
          set -o pipefail
          python tools/check_documentation_governance.py \
            --root . \
            --config .github/documentation-governance.json \
            2>&1 | tee documentation-governance.log

      - name: Validate canonical reference freshness
        run: |
          set -o pipefail
          python tools/check_canonical_reference_freshness.py \
            --root . \
            --config .github/reference-freshness.json \
            2>&1 | tee reference-freshness.log

      - name: Validate project Skill package integrity
        run: |
          set -o pipefail
          python tools/check_skill_package_integrity.py \
            2>&1 | tee skill-package-integrity.log

      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-diagnostics
          path: |
            documentation-governance.log
            reference-freshness.log
            skill-package-integrity.log
          if-no-files-found: warn
          retention-days: 7

      - name: Record verification boundaries
        run: |
          echo "Governance success proves repository structure, routing, canonical references, and Skill package integrity."
          echo "It does not prove Godot runtime, PDF rendering, accessibility, performance, user visual review, or branch-protection enforcement."
