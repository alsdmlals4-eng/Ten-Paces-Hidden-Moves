name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: scope-aware-validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Classify changed paths
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt
          if grep -Eq '^(project\.godot|data/|src/|scenes/|assets/|addons/|tests/.*\.(gd|py)$|tools/.*\.(ps1|cmd)$|\.github/workflows/)' changed-files.txt; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate project operating system
        run: python tools/check_project_operating_system.py --root . --config .github/documentation-governance.json

      - name: Validate canonical reference freshness
        run: python tools/check_canonical_reference_freshness.py --root . --config .github/reference-freshness.json

      - name: Validate Skill package integrity
        run: python tools/check_skill_package_integrity.py

      - name: Run governance regression tests
        run: python -m unittest discover -s tests -p 'test_project_governance.py'

      - name: Validate canonical combat impact map
        run: python tests/check_canonical_combat_docs.py

      - name: Validate card component contract
        if: steps.scope.outputs.code_changed == 'true'
        run: python tests/check_card_component_contract.py

      - name: Validate combat contract
        if: steps.scope.outputs.code_changed == 'true'
        run: python tests/check_combat_board_contract.py

      - name: Validate rival tendency contract
        if: steps.scope.outputs.code_changed == 'true'
        run: python tests/check_rival_tendency_contract.py

      - name: Validate A2 hypothesis and summary contract
        if: steps.scope.outputs.code_changed == 'true'
        run: python tests/check_repeat_poc_a2_contract.py

      - name: Validate A3 review UI contract
        if: steps.scope.outputs.code_changed == 'true'
        run: python tests/check_repeat_poc_a3_contract.py

      - name: Parse PowerShell automations for code changes
        if: steps.scope.outputs.code_changed == 'true'
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1",
            "tools/verify_repeat_poc_a1.ps1",
            "tools/verify_repeat_poc_a2.ps1",
            "tools/verify_repeat_poc_a3.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          }

      - name: Record deferred runtime boundary
        if: steps.scope.outputs.code_changed == 'true' && vars.ACTIONS_FULL_VALIDATION_ENABLED != 'true'
        run: echo "Godot and OS/Python matrix checks require Full Validation evidence."

  apply-a3-board-verifier:
    name: apply-a3-review-gate-verifier
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/repeat-poc-a3-review-ui-closeout'
    runs-on: ubuntu-latest
    steps:
      - name: Check out A3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/repeat-poc-a3-review-ui-closeout
          fetch-depth: 0
          show-progress: false
      - name: Update board verifier
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/verify_combat_board.gd")
          text = path.read_text(encoding="utf-8")
          if "Resolved bundle must stop at review_ready before advancing." in text:
              print("A3 board verifier already updated.")
              raise SystemExit(0)

          replacements = [
              (
                  '''    await create_timer(2.3).timeout

    var after_state := board.get_combat_state_snapshot()
''',
                  '''    await create_timer(2.3).timeout

    if str(board.get_meta("presentation_state", "")) != "review_ready":
        failures.append("Resolved bundle must stop at review_ready before advancing.")
    if not bool(board.get_meta("inputs_locked", false)):
        failures.append("Review must keep planning inputs locked.")
    if board.combat_review_panel == null or not board.combat_review_panel.visible:
        failures.append("Resolved bundle must show the combat review panel.")
    board._on_review_continue_requested()
    await process_frame

    var after_state := board.get_combat_state_snapshot()
'''
              ),
              (
                  '''    for required_state in ["committed", "resolving", "presenting_result", "next_bundle_ready"]:
''',
                  '''    for required_state in ["committed", "resolving", "presenting_result", "review_ready", "next_bundle_ready"]:
'''
              ),
              (
                  '''    board.combat_progress_button.request_progress()
    for _attempt in range(100):
        if str(board.get_meta("presentation_state", "")) == "next_bundle_ready":
            return
        await create_timer(0.05).timeout
    failures.append("Second bundle must leave presenting_result and unlock planning without requiring immediate-complete.")
''',
                  '''    board.combat_progress_button.request_progress()
    var review_seen := false
    for _attempt in range(100):
        var state_value := str(board.get_meta("presentation_state", ""))
        if state_value == "review_ready":
            review_seen = true
            if board.combat_review_panel == null or not board.combat_review_panel.visible:
                failures.append("Second bundle review must show the combat review panel.")
            board._on_review_continue_requested()
            await process_frame
            if str(board.get_meta("presentation_state", "")) == "next_bundle_ready":
                return
        await create_timer(0.05).timeout
    if not review_seen:
        failures.append("Second bundle must enter review_ready before the next bundle.")
    else:
        failures.append("Second bundle must advance after explicit review confirmation.")
'''
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit("expected verifier block was not found")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY
          rm -f .github/patches/a3-board-verifier.patch
          rm -f .github/workflows/a3-board-verifier-self-apply.yml
          rm -f .github/workflows/a3-board-verifier-self-apply-v2.yml
      - name: Commit verifier update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/verify_combat_board.gd .github/patches .github/workflows
          git commit -m "test: require explicit review confirmation before advancing"
          git push origin HEAD:agent/repeat-poc-a3-review-ui-closeout
