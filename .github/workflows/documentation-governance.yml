name: Documentation Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "README.md"
      - "START_HERE.md"
      - "AGENTS.md"
      - "**/*.md"
      - "docs/**"
      - "[[]기획서[]]/**"
      - "skills/**"
      - "templates/**"
      - "data/**"
      - "assets/**"
      - "scenes/**"
      - "src/**"
      - "addons/**"
      - "tests/**"
      - "tools/**"
      - "project.godot"
      - ".github/documentation-governance.json"
      - ".github/reference-freshness.json"
      - ".github/workflows/documentation-governance.yml"
      - ".github/workflows/card-component-contract.yml"
      - ".github/workflows/full-validation-matrix.yml"
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope
        required: true
        type: choice
        default: code
        options: [docs, code]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GODOT_VERSION: "4.7.1"

jobs:
  governance:
    name: documentation-governance
    if: ${{ vars.CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Classify change scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            python tools/classify_ci_scope.py \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}"
          else
            echo "scope=${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run documentation validation
        if: ${{ steps.scope.outputs.scope == 'docs' }}
        run: python tools/run_ci_suite.py docs

      - name: Run full Ubuntu contract validation
        if: ${{ steps.scope.outputs.scope == 'code' }}
        run: python tools/run_ci_suite.py code

      - name: Parse PowerShell automations
        if: ${{ steps.scope.outputs.scope == 'code' }}
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Cache Godot
        if: ${{ steps.scope.outputs.scope == 'code' }}
        uses: actions/cache@v4
        with:
          path: .ci/godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: ${{ steps.scope.outputs.scope == 'code' }}
        id: godot
        run: python tools/install_godot_ci.py --version "${{ env.GODOT_VERSION }}"

      - name: Run Godot PR verifiers
        if: ${{ steps.scope.outputs.scope == 'code' }}
        run: python tools/run_godot_ci.py --godot "${{ steps.godot.outputs.godot_path }}" --profile pr

      - name: Record verification boundary
        if: always()
        run: |
          echo "scope=${{ steps.scope.outputs.scope }}"
          echo "Actions quota availability is controlled by repository variable CI_ENABLED."
          echo "This job does not prove human playtest, assistive-technology usability, release performance, or branch-protection enforcement."
