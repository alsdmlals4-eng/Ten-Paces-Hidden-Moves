name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.scope.outputs.code_changed }}
      docs_changed: ${{ steps.scope.outputs.docs_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt
          if grep -Eq '^(project\.godot|data/|src/|scenes/|assets/|addons/|tests/.*\.(gd|py)$|tools/.*\.(ps1|cmd)$|\.github/workflows/)' changed-files.txt; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -Eq '^(docs/|\[기획서\]/|skills/|templates/|README\.md|START_HERE\.md|AGENTS\.md|\.github/.*\.(json|ya?ml)$)' changed-files.txt; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

  docs-only:
    name: docs-validator
    needs: classify
    if: needs.classify.outputs.docs_changed == 'true' && needs.classify.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate documentation contracts
        shell: bash
        run: |
          set -o pipefail
          python tools/check_project_operating_system.py --root . --config .github/documentation-governance.json
          python tools/check_canonical_reference_freshness.py --root . --config .github/reference-freshness.json
          python tools/check_skill_package_integrity.py
          python -m unittest discover -s tests -p 'test_project_governance.py'
          python tests/check_canonical_combat_docs.py

  code-contracts:
    name: ubuntu-code-contracts
    needs: classify
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run full static contracts once
        shell: bash
        run: |
          set -o pipefail
          python tools/check_project_operating_system.py --root . --config .github/documentation-governance.json
          python tools/check_canonical_reference_freshness.py --root . --config .github/reference-freshness.json
          python tools/check_skill_package_integrity.py
          python -m unittest discover -s tests -p 'test_project_governance.py'
          python tests/check_card_component_contract.py
          python tests/check_combat_board_contract.py
          python tests/check_canonical_combat_docs.py
      - name: Parse PowerShell automations
        shell: pwsh
        run: |
          $paths = @("tools/verify_and_commit_step0.ps1", "tools/verify_and_commit_combat_foundation.ps1", "tools/run_combat_board.ps1")
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $path), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          }

  validation-boundary:
    name: validation-boundary
    needs: classify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Docs-only: one Ubuntu/Python documentation validator."
          echo "Code: one Ubuntu full static-contract job."
          echo "Godot and OS/Python matrix are deferred while Actions quota is unavailable."
          echo "Deferred checks are BLOCKED_BY_ACTIONS_QUOTA, never PASS."
