name: Full Validation

on:
  pull_request:
    branches: [agent/prepare-momentum-and-auto-placement]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terminal-diagnosis:
    name: terminal-presentation-diagnosis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Godot 4.7
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false
      - name: Import and parse project
        run: godot --headless --editor --path . --quit
      - name: Verify terminal presentation
        shell: bash
        run: |
          set +e
          godot --headless --path . --script res://tests/verify_combat_terminal_presentation.gd > terminal-verifier.log 2>&1
          status=$?
          cat terminal-verifier.log
          echo "$status" > terminal-verifier-exit.txt
          exit "$status"
      - name: Upload terminal diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-presentation-diagnosis
          path: |
            terminal-verifier.log
            terminal-verifier-exit.txt
          retention-days: 1
