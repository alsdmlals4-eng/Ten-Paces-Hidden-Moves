name: Full Validation

on:
  pull_request:
    branches: [agent/prepare-momentum-and-auto-placement]
  push:
    branches: [main]
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-contracts:
    name: ${{ matrix.os }}-python-${{ matrix.python }}
    if: github.event_name == 'pull_request' || vars.ACTIONS_FULL_VALIDATION_ENABLED == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Validate project operating system
        run: python tools/check_project_operating_system.py --root . --config .github/documentation-governance.json
      - name: Validate canonical reference freshness
        run: python tools/check_canonical_reference_freshness.py --root . --config .github/reference-freshness.json
      - name: Validate Skill package integrity
        run: python tools/check_skill_package_integrity.py
      - name: Run governance regression tests
        run: python -m unittest discover -s tests -p "test_project_governance.py"
      - name: Validate card component contract
        run: python tests/check_card_component_contract.py
      - name: Validate combat contract
        run: python tests/check_combat_board_contract.py
      - name: Validate canonical combat impact map
        run: python tests/check_canonical_combat_docs.py
      - name: Validate rival tendency contract
        run: python tests/check_rival_tendency_contract.py
      - name: Validate A2 hypothesis and summary contract
        run: python tests/check_repeat_poc_a2_contract.py
      - name: Validate A3 review UI contract
        run: python tests/check_repeat_poc_a3_contract.py
      - name: Validate prepare and auto placement contract
        run: python tests/check_prepare_auto_placement_contract.py

  godot-headless:
    name: ubuntu-godot-headless
    if: github.event_name == 'pull_request' || vars.ACTIONS_FULL_VALIDATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Godot 4.7
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false
      - name: Import and parse project
        run: godot --headless --editor --path . --quit
      - name: Verify STEP 0
        run: godot --headless --path . --script res://tests/verify_step0.gd
      - name: Verify combat board
        run: godot --headless --path . --script res://tests/verify_combat_board.gd
      - name: Verify response rules
        run: godot --headless --path . --script res://tests/verify_response_rules.gd
      - name: Verify ultimate interruption engagement
        run: godot --headless --path . --script res://tests/verify_ultimate_interrupt_engagement.gd
      - name: Verify ultimate UI
        run: godot --headless --path . --script res://tests/verify_ultimate_ui.gd
      - name: Verify presentation liveness
        run: godot --headless --path . --script res://tests/verify_combat_presentation_liveness.gd
      - name: Verify terminal presentation
        run: godot --headless --path . --script res://tests/verify_combat_terminal_presentation.gd
      - name: Verify focus order
        run: godot --headless --path . --script res://tests/verify_combat_focus_order.gd
      - name: Verify keyboard accessibility
        run: godot --headless --path . --script res://tests/verify_combat_keyboard_accessibility.gd
      - name: Verify layout accessibility
        run: godot --headless --path . --script res://tests/verify_combat_layout_accessibility.gd
      - name: Verify rival tendency
        run: godot --headless --path . --script res://tests/verify_ai_rival_tendency.gd
      - name: Verify opponent hypothesis
        run: godot --headless --path . --script res://tests/verify_combat_hypothesis.gd
      - name: Verify review summary
        run: godot --headless --path . --script res://tests/verify_combat_review_summary.gd
      - name: Verify review UI
        run: godot --headless --path . --script res://tests/verify_combat_review_ui.gd
      - name: Verify prepare momentum
        run: godot --headless --path . --script res://tests/verify_prepare_momentum.gd
      - name: Verify auto card placement
        run: godot --headless --path . --script res://tests/verify_auto_card_placement.gd
