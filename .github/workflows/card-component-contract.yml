name: Card Component Contract

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "project.godot"
      - "README.md"
      - "docs/**"
      - "[[]기획서[]]/**"
      - "skills/**"
      - "data/cards/**"
      - "data/combat/**"
      - "assets/ui/cards/**"
      - "assets/backgrounds/**"
      - "assets/portraits/**"
      - "assets/characters/**"
      - "assets/vfx/**"
      - "assets/ASSET_MANIFEST.json"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "scenes/combat/**"
      - "src/ui/**"
      - "src/combat/**"
      - "tests/check_card_component_contract.py"
      - "tests/check_combat_board_contract.py"
      - "tests/check_canonical_combat_docs.py"
      - "tests/verify_step0.gd"
      - "tests/verify_combat_board.gd"
      - "tests/verify_response_rules.gd"
      - "tests/verify_ultimate_interrupt_engagement.gd"
      - "tests/verify_ultimate_ui.gd"
      - "tests/verify_combat_presentation_liveness.gd"
      - "tests/verify_combat_terminal_presentation.gd"
      - "tests/verify_combat_sfx_presentation.gd"
      - "tests/verify_combat_character_art.gd"
      - "tests/verify_combat_focus_visuals.gd"
      - "tests/verify_combat_focus_order.gd"
      - "tests/verify_combat_assistive_labels.gd"
      - "tests/verify_combat_pointer_lock.gd"
      - "tests/verify_combat_presentation_controls.gd"
      - "tests/verify_combat_keyboard_accessibility.gd"
      - "tests/verify_combat_layout_accessibility.gd"
      - "tools/verify_and_commit_step0.ps1"
      - "tools/verify_and_commit_step0.cmd"
      - "tools/verify_and_commit_combat_foundation.ps1"
      - "tools/run_combat_board.ps1"
      - "tools/run_combat_board.cmd"
      - ".github/reference-freshness.json"
      - ".github/workflows/card-component-contract.yml"
  push:
    paths:
      - "project.godot"
      - "README.md"
      - "docs/**"
      - "[[]기획서[]]/**"
      - "skills/**"
      - "data/cards/**"
      - "data/combat/**"
      - "assets/ui/cards/**"
      - "assets/backgrounds/**"
      - "assets/portraits/**"
      - "assets/characters/**"
      - "assets/vfx/**"
      - "assets/ASSET_MANIFEST.json"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "scenes/combat/**"
      - "src/ui/**"
      - "src/combat/**"
      - "tests/check_card_component_contract.py"
      - "tests/check_combat_board_contract.py"
      - "tests/check_canonical_combat_docs.py"
      - "tests/verify_step0.gd"
      - "tests/verify_combat_board.gd"
      - "tests/verify_response_rules.gd"
      - "tests/verify_ultimate_interrupt_engagement.gd"
      - "tests/verify_ultimate_ui.gd"
      - "tests/verify_combat_presentation_liveness.gd"
      - "tests/verify_combat_terminal_presentation.gd"
      - "tests/verify_combat_sfx_presentation.gd"
      - "tests/verify_combat_character_art.gd"
      - "tests/verify_combat_focus_visuals.gd"
      - "tests/verify_combat_focus_order.gd"
      - "tests/verify_combat_assistive_labels.gd"
      - "tests/verify_combat_pointer_lock.gd"
      - "tests/verify_combat_presentation_controls.gd"
      - "tests/verify_combat_keyboard_accessibility.gd"
      - "tests/verify_combat_layout_accessibility.gd"
      - "tools/verify_and_commit_step0.ps1"
      - "tools/verify_and_commit_step0.cmd"
      - "tools/verify_and_commit_combat_foundation.ps1"
      - "tools/run_combat_board.ps1"
      - "tools/run_combat_board.cmd"
      - ".github/reference-freshness.json"
      - ".github/workflows/card-component-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: card-component-contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile contract tests
        run: |
          python -m py_compile tests/check_card_component_contract.py
          python -m py_compile tests/check_combat_board_contract.py
          python -m py_compile tests/check_canonical_combat_docs.py

      - name: Validate card component contract
        run: python tests/check_card_component_contract.py

      - name: Validate combat contract
        run: python tests/check_combat_board_contract.py

      - name: Validate canonical combat impact map
        run: python tests/check_canonical_combat_docs.py

      - name: Parse PowerShell automations
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Record verification boundaries
        run: |
          echo "Card contract success proves static data, document, automation, and contract checks on this commit."
          echo "It does not prove Godot runtime, Windows user comprehension, assistive-technology usability, release performance, or branch-protection enforcement."
