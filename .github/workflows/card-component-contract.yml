  pull_request:
    paths:
      - "project.godot"
      - "README.md"
      - "docs/ACTIVE_CONTEXT.md"
      - "docs/01_GAME_DESIGN.md"
      - "docs/02_COMBAT_RULES.md"
      - "docs/03_CONTENT_CATALOG.md"
      - "docs/04_ROADMAP.md"
      - "docs/05_COMBAT_POC_SPEC.md"
      - "docs/06_STARTING_FACTION_MASTERY_DATA.md"
      - "docs/07_COMBAT_UI_SPEC.md"
      - "docs/08_TEST_CHECKLIST.md"
      - "docs/09_COMBAT_SYSTEM_ARCHITECTURE.md"
      - "docs/10_COMBAT_PRESENTATION_PLAN.md"
      - "docs/11_BASE_ADOPTION_AND_LEARNING_LOG.md"
      - "[기획서]/00_프로젝트_허브/ACTIVE_CONTEXT.md"
      - "[기획서]/00_프로젝트_허브/SKILL_REGISTRY.json"
      - "skills/game-design/ten-paces-game-design/SKILL.md"
      - "skills/engineering/combat-implementation-handoff/SKILL.md"
      - "skills/ux-ui-accessibility/combat-ux-and-accessibility/SKILL.md"
      - "skills/qa/ten-paces-verification/SKILL.md"
      - "data/cards/**"
      - "data/combat/**"
      - "assets/ui/cards/**"
      - "assets/backgrounds/**"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "scenes/combat/**"
      - "src/ui/**"
      - "src/combat/**"
      - "tests/check_card_component_contract.py"
      - "tests/check_combat_board_contract.py"
      - "tests/check_canonical_combat_docs.py"
      - "tests/verify_step0.gd"
      - "tests/verify_combat_board.gd"
      - "tests/verify_response_rules.gd"
      - "tools/verify_and_commit_step0.ps1"
      - "tools/verify_and_commit_step0.cmd"
      - "tools/verify_and_commit_combat_foundation.ps1"
      - "tools/run_combat_board.ps1"
      - "tools/run_combat_board.cmd"
      - ".github/reference-freshness.json"
      - ".github/workflows/card-component-contract.yml"
  push:
    paths:
      - "project.godot"
      - "README.md"
      - "docs/ACTIVE_CONTEXT.md"
      - "docs/01_GAME_DESIGN.md"
      - "docs/02_COMBAT_RULES.md"
      - "docs/03_CONTENT_CATALOG.md"
      - "docs/04_ROADMAP.md"
      - "docs/05_COMBAT_POC_SPEC.md"
      - "docs/06_STARTING_FACTION_MASTERY_DATA.md"
      - "docs/07_COMBAT_UI_SPEC.md"
      - "docs/08_TEST_CHECKLIST.md"
      - "docs/09_COMBAT_SYSTEM_ARCHITECTURE.md"
      - "docs/10_COMBAT_PRESENTATION_PLAN.md"
      - "docs/11_BASE_ADOPTION_AND_LEARNING_LOG.md"
      - "[기획서]/00_프로젝트_허브/ACTIVE_CONTEXT.md"
      - "[기획서]/00_프로젝트_허브/SKILL_REGISTRY.json"
      - "skills/game-design/ten-paces-game-design/SKILL.md"
      - "skills/engineering/combat-implementation-handoff/SKILL.md"
      - "skills/ux-ui-accessibility/combat-ux-and-accessibility/SKILL.md"
      - "skills/qa/ten-paces-verification/SKILL.md"
      - "data/cards/**"
      - "data/combat/**"
      - "assets/ui/cards/**"
      - "assets/backgrounds/**"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "scenes/combat/**"
      - "src/ui/**"
      - "src/combat/**"
      - "tests/check_card_component_contract.py"
      - "tests/check_combat_board_contract.py"
      - "tests/check_canonical_combat_docs.py"
      - "tests/verify_step0.gd"
      - "tests/verify_combat_board.gd"
      - "tests/verify_response_rules.gd"
      - "tools/verify_and_commit_step0.ps1"
      - "tools/verify_and_commit_step0.cmd"
      - "tools/verify_and_commit_combat_foundation.ps1"
      - "tools/run_combat_board.ps1"
      - "tools/run_combat_board.cmd"
      - ".github/reference-freshness.json"
      - ".github/workflows/card-component-contract.yml"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile contract tests
        run: |
          python -m py_compile tests/check_card_component_contract.py
          python -m py_compile tests/check_combat_board_contract.py
          python -m py_compile tests/check_canonical_combat_docs.py
      - name: Validate card component contract
        run: python tests/check_card_component_contract.py
      - name: Validate STEP 1-10.6 combat contract
        run: python tests/check_combat_board_contract.py
      - name: Validate canonical combat impact map
        run: python tests/check_canonical_combat_docs.py
      - name: Parse PowerShell automations
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }
