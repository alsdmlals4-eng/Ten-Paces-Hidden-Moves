name: Card Component Contract

on:
  pull_request:
    paths:
      - "project.godot"
      - "data/cards/**"
      - "assets/ui/cards/**"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "src/ui/**"
      - "tests/check_card_component_contract.py"
      - ".github/workflows/card-component-contract.yml"
  push:
    paths:
      - "project.godot"
      - "data/cards/**"
      - "assets/ui/cards/**"
      - "assets/reference/step_02_character_scale_and_tile_placement.svg"
      - "scenes/ui/**"
      - "src/ui/**"
      - "tests/check_card_component_contract.py"
      - ".github/workflows/card-component-contract.yml"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile contract test
        run: python -m py_compile tests/check_card_component_contract.py
      - name: Validate card component contract
        run: python tests/check_card_component_contract.py
