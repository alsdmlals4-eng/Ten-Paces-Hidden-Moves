name: Full Validation Matrix

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GODOT_VERSION: "4.7.1"

jobs:
  matrix:
    name: full-${{ matrix.os }}-py${{ matrix.python-version }}
    if: ${{ vars.CI_ENABLED == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run full static contract suite
        run: python tools/run_ci_suite.py full

      - name: Parse PowerShell automations once per OS
        if: ${{ matrix.python-version == '3.12' }}
        shell: pwsh
        run: |
          $paths = @(
            "tools/verify_and_commit_step0.ps1",
            "tools/verify_and_commit_combat_foundation.ps1",
            "tools/run_combat_board.ps1"
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Cache Godot once per OS
        if: ${{ matrix.python-version == '3.12' }}
        uses: actions/cache@v4
        with:
          path: .ci/godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot once per OS
        if: ${{ matrix.python-version == '3.12' }}
        id: godot
        run: python tools/install_godot_ci.py --version "${{ env.GODOT_VERSION }}"

      - name: Run full Godot verifiers once per OS
        if: ${{ matrix.python-version == '3.12' }}
        run: python tools/run_godot_ci.py --godot "${{ steps.godot.outputs.godot_path }}" --profile full
