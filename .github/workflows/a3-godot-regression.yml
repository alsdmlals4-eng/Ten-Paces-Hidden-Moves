name: A3 Terminal Review Diagnostic

on:
  pull_request:
    branches:
      - agent/repeat-poc-a3-review-ui-closeout
    paths:
      - ".github/workflows/a3-godot-regression.yml"

permissions:
  contents: read

jobs:
  terminal-review:
    name: ubuntu-terminal-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false
      - name: Import and parse project
        run: godot --headless --editor --path . --quit
      - name: Verify terminal presentation
        id: terminal
        continue-on-error: true
        shell: bash
        run: |
          set +e
          godot --headless --path . --script res://tests/verify_combat_terminal_presentation.gd > terminal-review.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload terminal diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a3-terminal-review-log
          path: terminal-review.log
          if-no-files-found: error
      - name: Fail on terminal verifier error
        if: steps.terminal.outputs.status != '0'
        run: exit 1
