name: A2 Board Patch Apply

on:
  pull_request:
    branches:
      - agent/repeat-poc-a1-rival-ai
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/a2-self-apply.yml"
      - ".github/patches/a2-board-integration.patch"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repeat-poc-a2-hypothesis-summary
          fetch-depth: 0
          show-progress: false
      - name: Apply integration patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/patches/a2-board-integration.patch
          git apply .github/patches/a2-board-integration.patch
          rm .github/patches/a2-board-integration.patch
          rm .github/workflows/a2-self-apply.yml
      - name: Commit integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/combat/combat_board_preview.gd .github/patches .github/workflows/a2-self-apply.yml
          git commit -m "feat: integrate hypothesis snapshots and review summaries"
          git push origin HEAD:agent/repeat-poc-a2-hypothesis-summary
