name: A3 Board Verifier Patch Apply

on:
  pull_request:
    branches:
      - agent/repeat-poc-a2-hypothesis-summary
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/a3-board-verifier-self-apply.yml"
      - ".github/patches/a3-board-verifier.patch"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repeat-poc-a3-review-ui-closeout
          fetch-depth: 0
          show-progress: false
      - name: Apply verifier replacements
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/verify_combat_board.gd")
          text = path.read_text(encoding="utf-8")

          old_first = '''    await create_timer(2.3).timeout

    var after_state := board.get_combat_state_snapshot()
'''
          new_first = '''    await create_timer(2.3).timeout

    if str(board.get_meta("presentation_state", "")) != "review_ready":
        failures.append("Resolved bundle must stop at review_ready before advancing.")
    if not bool(board.get_meta("inputs_locked", false)):
        failures.append("Review must keep planning inputs locked.")
    if board.combat_review_panel == null or not board.combat_review_panel.visible:
        failures.append("Resolved bundle must show the combat review panel.")
    board._on_review_continue_requested()
    await process_frame

    var after_state := board.get_combat_state_snapshot()
'''
          if old_first not in text:
              raise SystemExit("first review-gate insertion point was not found")
          text = text.replace(old_first, new_first, 1)

          old_history = '''    for required_state in ["committed", "resolving", "presenting_result", "next_bundle_ready"]:
'''
          new_history = '''    for required_state in ["committed", "resolving", "presenting_result", "review_ready", "next_bundle_ready"]:
'''
          if old_history not in text:
              raise SystemExit("presentation history expectation was not found")
          text = text.replace(old_history, new_history, 1)

          old_second = '''    board.combat_progress_button.request_progress()
    for _attempt in range(100):
        if str(board.get_meta("presentation_state", "")) == "next_bundle_ready":
            return
        await create_timer(0.05).timeout
    failures.append("Second bundle must leave presenting_result and unlock planning without requiring immediate-complete.")
'''
          new_second = '''    board.combat_progress_button.request_progress()
    var review_seen := false
    for _attempt in range(100):
        var state_value := str(board.get_meta("presentation_state", ""))
        if state_value == "review_ready":
            review_seen = true
            if board.combat_review_panel == null or not board.combat_review_panel.visible:
                failures.append("Second bundle review must show the combat review panel.")
            board._on_review_continue_requested()
            await process_frame
            if str(board.get_meta("presentation_state", "")) == "next_bundle_ready":
                return
        await create_timer(0.05).timeout
    if not review_seen:
        failures.append("Second bundle must enter review_ready before the next bundle.")
    else:
        failures.append("Second bundle must advance after explicit review confirmation.")
'''
          if old_second not in text:
              raise SystemExit("second bundle transition expectation was not found")
          text = text.replace(old_second, new_second, 1)

          path.write_text(text, encoding="utf-8")
          PY
          rm .github/patches/a3-board-verifier.patch
          rm .github/workflows/a3-board-verifier-self-apply.yml
      - name: Commit verifier contract
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/verify_combat_board.gd .github/patches .github/workflows/a3-board-verifier-self-apply.yml
          git commit -m "test: require explicit review confirmation before advancing"
          git push origin HEAD:agent/repeat-poc-a3-review-ui-closeout
