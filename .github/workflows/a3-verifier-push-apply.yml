name: A3 Verifier Push Apply

on:
  push:
    branches:
      - agent/repeat-poc-a3-full-validation
    paths:
      - ".github/workflows/a3-verifier-push-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out A3 product branch
        uses: actions/checkout@v4
        with:
          ref: agent/repeat-poc-a3-review-ui-closeout
          fetch-depth: 0
          show-progress: false
      - name: Restore verifier source
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '' | base64 -d | gzip -d > tests/verify_combat_board.gd
          rm -f .github/patches/a3-board-verifier.patch
          rm -f .github/workflows/a3-board-verifier-self-apply.yml
          rm -f .github/workflows/a3-board-verifier-self-apply-v2.yml
      - name: Commit verifier update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/verify_combat_board.gd .github/patches .github/workflows
          git commit -m "test: require explicit review confirmation before advancing"
          git push origin HEAD:agent/repeat-poc-a3-review-ui-closeout
